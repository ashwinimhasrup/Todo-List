name: CI Pipeline

on:
  push:
    branches: 
      - main
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
    tags:
      - 'v*.*.*'
  pull_request:
    branches: 
      - main
      - develop

jobs:
  build-test-push:
    #runs-on: ubuntu-latest
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install deps
        run: npm install

      - name: Run tests
        run: npm test || echo "No tests configured"

      - name: lint
        run: npm run lint || echo "Lint not configured"
        continue-on-error: true

      - name: Set Environment & Image Tag
        id: set-env
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/develop ]]; then
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "tag=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "tag=prod-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/heads/release/* ]]; then
            echo "env=staging" >> $GITHUB_OUTPUT
            echo "tag=staging-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/heads/hotfix/* ]]; then
            echo "env=hotfix" >> $GITHUB_OUTPUT
            echo "tag=hotfix-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "env=feature" >> $GITHUB_OUTPUT
            echo "tag=feature-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Docker login
        if: ${{ steps.set-env.outputs.env != 'feature' }}
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/todolist:${{ steps.set-env.outputs.tag }}
          echo "Building $IMAGE"
          docker build -t $IMAGE .

      - name: Push Docker image
        if: ${{ steps.set-env.outputs.env != 'feature' }}
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/todolist:${{ steps.set-env.outputs.tag }}
          echo "Pushing $IMAGE"
          docker push $IMAGE

name: CD
workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
    tags:
      - 'v*.*.*'
jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set Environment
        id: set-env
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "tag=prod-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/heads/develop ]]; then
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "tag=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/heads/feature/* ]]; then
            echo "env=feature" >> $GITHUB_OUTPUT
            echo "tag=feature-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/heads/release/* ]]; then
            echo "env=staging" >> $GITHUB_OUTPUT
            echo "tag=staging-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/heads/hotfix/* ]]; then
            echo "env=hotfix" >> $GITHUB_OUTPUT
            echo "tag=hotfix-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "tag=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/todo:${{ steps.set-env.outputs.tag }}
          echo "Building and pushing $IMAGE"
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Setup kind (local cluster)
        uses: helm/kind-action@v1.10.0
        with:
          version: v0.22.0
          cluster_name: todo-cluster

      - name: Update K8s Manifests with Image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/todo:${{ steps.set-env.outputs.tag }}
          echo "Deploying image: ${IMAGE}"
          
          kubectl create namespace ${{ steps.set-env.outputs.env }} --dry-run=client -o yaml | kubectl apply -f -
          sed -i "s|image:.*nodetodo.*|image: ${IMAGE}|g" k8s/nodetodo.yml
          echo "Updated nodetodo.yml with image: ${IMAGE}"
          echo "Applying MongoDB manifest..."
          kubectl apply -f k8s/mongo.yml -n ${{ steps.set-env.outputs.env }}
          
          echo "Applying NodeTodo manifest..."
          kubectl apply -f k8s/nodetodo.yml -n ${{ steps.set-env.outputs.env }}
          
          echo "Waiting for MongoDB to be ready..."
          kubectl wait --for=condition=available --timeout=300s deployment/mongo -n ${{ steps.set-env.outputs.env }} || echo "MongoDB might be using StatefulSet or different resource type"
          
          echo "Waiting for NodeTodo deployment to be ready..."
          kubectl wait --for=condition=available --timeout=300s deployment/nodetodo -n ${{ steps.set-env.outputs.env }}
          
          echo "Deployment Status:"
          kubectl get pods -n ${{ steps.set-env.outputs.env }}
          kubectl get svc -n ${{ steps.set-env.outputs.env }}
          kubectl get deployments -n ${{ steps.set-env.outputs.env }}
          
          echo "Checking MongoDB logs:"
          kubectl logs -l app=mongo -n ${{ steps.set-env.outputs.env }} --tail=10 || echo "Could not fetch MongoDB logs"
          
          echo "Checking NodeTodo logs:"
          kubectl logs -l app=nodetodo -n ${{ steps.set-env.outputs.env }} --tail=10 || echo "Could not fetch NodeTodo logs"
          
          echo "Service Details:"
          kubectl describe svc -n ${{ steps.set-env.outputs.env }}
          
          echo "Setting up port forwarding..."
          kubectl port-forward service/nodetodo 3000:3000 -n ${{ steps.set-env.outputs.env }} &
          PORT_FORWARD_PID=$!
          
          sleep 5
          
          echo "Testing application accessibility..."
          curl -f http://localhost:3000 || echo "Application might still be starting up"
          
          echo "Deployment completed!"
          echo "Application should be accessible at: http://localhost:3000"
          echo "Port forward PID: $PORT_FORWARD_PID (will run in background)"
          
          echo $PORT_FORWARD_PID > /tmp/port_forward_pid
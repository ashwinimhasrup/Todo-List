name: CD

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
    tags:
      - 'v*.*.*'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set Environment
        id: set-env
        run: |
          REF="${GITHUB_REF}"
          if [[ "$REF" == "refs/heads/main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "tag=prod-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "$REF" == "refs/heads/develop" ]]; then
            echo "env=staging" >> $GITHUB_OUTPUT
            echo "tag=staging-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "$REF" =~ refs/heads/feature/.* ]]; then
            echo "env=feature" >> $GITHUB_OUTPUT
            echo "tag=feature-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "$REF" =~ refs/heads/release/.* ]]; then
            echo "env=staging" >> $GITHUB_OUTPUT
            echo "tag=staging-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "$REF" =~ refs/heads/hotfix/.* ]]; then
            echo "env=hotfix" >> $GITHUB_OUTPUT
            echo "tag=hotfix-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "$REF" =~ refs/tags/v.* ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "tag=${REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "tag=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/todo:${{ steps.set-env.outputs.tag }}
          echo "Building and pushing $IMAGE"
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          kubectl cluster-info

      - name: Deploy to Kubernetes
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/todo:${{ steps.set-env.outputs.tag }}
          NAMESPACE=${{ steps.set-env.outputs.env }}  
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

          # safer than sed: directly update deployments
          for deploy in $(kubectl get deploy -n $NAMESPACE -o name); do
            kubectl set image $deploy todo-container=$IMAGE -n $NAMESPACE
          done
